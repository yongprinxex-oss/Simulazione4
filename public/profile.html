<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo Utente - HN Tech Feed</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='12' y='12' width='76' height='76' rx='16' fill='%230d1117'/><rect x='18' y='18' width='64' height='64' rx='12' fill='none' stroke='%23ff7b2e' stroke-width='4'/><text x='50' y='67' text-anchor='middle' font-family='Arial, sans-serif' font-size='48' font-weight='700' fill='%23ff7b2e'>Y</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-content">
        <section class="panel page-section">
            <h2>Profilo Utente</h2>
            <p class="section-description">
                Metriche utente (karma, data creazione account) e ultime attivita da submitted.
            </p>
            <div class="form-grid">
                <div class="form-group input-wide">
                    <label for="user-id-input">Username HN</label>
                    <div class="input-wrapper">
                        <input id="user-id-input" type="text" placeholder="Es: pg" autocomplete="off">
                        <button id="btn-load-user" type="button" class="btn btn-primary">Carica Profilo</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="page-section">
            <div id="user-profile"></div>
        </section>

        <section class="page-section">
            <div id="user-activity"></div>
        </section>
    </main>

    <script type="module" src="../scripts/pages/profile.js"></script>
</body>
</html>
